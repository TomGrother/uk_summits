<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Summits</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>UK Summits</h1>
    <div id="authArea" class="auth-area"></div>
  </header>

  <main>
    <div id="map"></div>

    <aside id="sidebar">
      <div id="progress" class="progress"></div>

      <div class="filters">
        <input id="search" type="text" placeholder="Search summits..." />
        <select id="regionFilter">
          <option value="">All regions</option>
          <option value="Scotland">Scotland</option>
          <option value="Wales">Wales</option>
          <option value="England">England</option>
          <option value="Northern Ireland">Northern Ireland</option>
        </select>
      </div>

      <ul id="summitList"></ul>
    </aside>
  </main>

  <!-- Auth modal -->
  <div id="authModal" class="modal hidden">
    <div class="modal-content">
      <button class="close-btn" id="closeAuth">&times;</button>
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>

      <form id="loginForm" class="auth-form">
        <input name="username" placeholder="Username or email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <p class="error" id="loginError"></p>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <input name="username" placeholder="Username" required />
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <p class="hint">8+ characters, with an uppercase letter, lowercase letter, number and symbol.</p>
        <button type="submit">Create account</button>
        <p class="error" id="registerError"></p>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
